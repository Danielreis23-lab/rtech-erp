<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <title>Rtech ERP</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: grid;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);


        }

        .container {
            width: 420px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            padding: 30px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);

        }

        .container h1 {
            font-size: 36px;
            font-style: 'Poppins' sans-serif;
            text-align: center;
            color: rgb(255, 255, 255);
        }


        .campo {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }

        .campo input {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background-color: rgb(32, 32, 32);
            border: none;
            outline: none;
            font-size: 16px;
            padding: 20px 45px 20px 20px;
            color: #fff;
        }

        .campo input::placeholder {
            color: white;
        }

        .campo i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }

        .lembrar-senha {
            display: flex;
            justify-content: space-between;
            margin: -15px 0 15px;
            color: #ffffff;

        }

        .lembrar-senha input {
            accent-color: #ffffff;
        }

        .lembrar-senha a {
            color: #fff8f8;
            text-decoration: none;
        }


        .lembrar-senha a:hover {
            text-decoration: underline;
        }


        .login {
            width: 100%;
            height: 50px;
            background-color: #fff;
            border-radius: 40px;
            cursor: pointer;
            color: #333;
            font-size: 16px;
            font-weight: 600;
            border: none;

        }

        .login:hover {
            background: rgb(32, 32, 32);
            color: #fff;
            transition: 0.5s;
        }

        p {
            width: 100%;
            justify-content: space-between;
            margin-left: 10px;
            color: #ffffff;
        }

        .cad a {
            color: #fffdfd;
            text-decoration: none;
        }

        .cad a:hover {
            text-decoration: underline;
        }

        .erro,
        .mensagem-js {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 8px;
            display: none;
        }

        .erro {
            display: block;
            background: rgba(255, 77, 77, 0.18);
            border: 1px solid rgba(255, 77, 77, 0.35);
            color: #ffd6d6;
        }

        .mensagem-js {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #ffffff;
        }

        .cadastro {
            display: flex;
            text-align: center;
            margin-right: 10px;
        }

        footer {
            display: flex;
            margin-left: 150px;
        }
    </style>: ;
</head>

<body>
    <main class="container">
        <div class="box">
            <h1>Login</h1>

            {% if error %}
            <div class="erro">{{ error }}</div>
            {% endif %}

            <form id="formLogin" method="post" action="/login">
                <div id="mensagemJs" class="mensagem-js"></div>

                <div class="campo">
                    <input type="text" id="username" name="username" placeholder="Usuário" required>
                    <i class="bx bxs-user"></i>
                </div>

                <div class="campo">
                    <input type="password" id="password" name="password" placeholder="Senha" required>
                    <i class="bx bxs-lock"></i>
                </div>
                <div class="lembrar-senha">
                    <label>
                        <input type="checkbox">
                        Lembrar senha
                    </label>
                    <a href="#">Esqueceu a senha</a>
                </div>

                <button type="submit" class="login">Entrar</button>

            </form>
            <br>
            <div class="cadastro">
                <p class="cad">Não tenho uma conta ? <br> <a href="#">Criar cadastro</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>Rtech login</p>
    </footer>

    <script>
        const form = document.getElementById("formLogin");
        const username = document.getElementById("username");
        const password = document.getElementById("password");
        const mensagemJs = document.getElementById("mensagemJs");

        function mostrarMensagem(texto) {
            mensagemJs.style.display = "block";
            mensagemJs.textContent = texto;
        }

        function esconderMensagem() {
            mensagemJs.style.display = "none";
            mensagemJs.textContent = "";
        }

        form.addEventListener("submit", function (event) {
            esconderMensagem();

            if (username.value.trim() === "" || password.value.trim() === "") {
                event.preventDefault();
                mostrarMensagem("Preencha todos os campos.");
                return;
            }

            if (password.value.trim().length < 6) {
                event.preventDefault();
                mostrarMensagem("A senha deve ter pelo menos 6 caracteres.");
                return;
            }

        });
    </script>
</body>

</html>
